<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brochures · Sostenibilidad</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .container {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 4rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #1a1a1a;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #555;
            margin-bottom: 2rem;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn {
            display: block;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .btn-davivienda {
            background: #c4122c;
            color: #fff;
        }
        .btn-davivienda:hover {
            background: #9e0e23;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(196,18,44,0.25);
        }
        .btn-cerrejon {
            background: #f39c12;
            color: #fff;
        }
        .btn-cerrejon:hover {
            background: #d68910;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(243,156,18,0.25);
        }
        .footer {
            margin-top: 2rem;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Brochures de Sostenibilidad</h1>
        <p>Selecciona la empresa para ver su informe de sostenibilidad interactivo</p>
        <div class="btn-group">
            <a href="davivienda.html" class="btn btn-davivienda">🏦 Davivienda · Sector Financiero</a>
            <a href="cerrejon.html" class="btn btn-cerrejon">⛏️ Cerrejón · Sector Extractivo</a>
        </div>
        <div class="footer">Grupo 302427742_1 · UNAD · ECAPMA · Julio 2026</div>
    </div>
</body>
</html>
